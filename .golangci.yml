# golangci-lint v2 config for tinyforge-cli
# Docs: https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m
  go: "1.23"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell

  settings:
    errcheck:
      # 常见的允许忽略的调用
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*net/http.Response).Body.Close
        - (*encoding/json.Encoder).Encode
        - os.Setenv
        - os.MkdirAll
        - os.WriteFile

  exclusions:
    paths:
      - bin
      - dist
    rules:
      # 测试代码不要求严格 errcheck（fixture 写文件失败用 panic 也无所谓）
      - path: _test\.go
        linters:
          - errcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
